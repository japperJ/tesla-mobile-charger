services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DB_PATH=/app/data/charger.db
      - VCP_URL=https://vcp:4040
    volumes:
      - ./data:/app/data
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vcp:
    build:
      context: ./vcp
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
    environment:
      - TESLA_KEY_FILE=/app/data/ec_private_key.pem
      - TESLA_HTTP_PROXY_TLS_CERT=/etc/tesla/tls.cert
      - TESLA_HTTP_PROXY_TLS_KEY=/etc/tesla/tls.key
      - TESLA_HTTP_PROXY_HOST=0.0.0.0
      - TESLA_HTTP_PROXY_PORT=4040
      - TESLA_VERBOSE=true
    depends_on:
      backend:
        condition: service_healthy

  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile.cron
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DB_PATH=/app/data/charger.db
    volumes:
      - ./data:/app/data
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend

volumes:
  data:
